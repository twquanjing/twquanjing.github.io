<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全境工程有限公司 - 網站管理後台</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.netlifyIdentity) {
        // 1. 初始化 Netlify 連線
        window.netlifyIdentity.init({
          APIUrl: 'https://calm-tarsier-bd25df.netlify.app/.netlify/identity'
        });

        // 2. ✨ 核心追加：當 Google 登入成功時，立刻關閉視窗，並強行定錨在後台介面！
        window.netlifyIdentity.on('login', () => {
          window.netlifyIdentity.close();
          // 如果網址後面沒有 /#/，強制幫他加上去，直接發動後台管理系統
          if (!window.location.hash || window.location.hash === '#') {
            window.location.href = 'https://twquanjing.github.io/admin/#/';
          } else {
            // 如果已經有雜湊值，直接重新整理刷新狀態
            window.location.reload();
          }
        });
      }
    });
  </script>
</body>
</html>
