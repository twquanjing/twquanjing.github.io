<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全境工程有限公司 - 網站管理後台</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.CMS) {
      window.CMS.registerLocale('zh_TW', {
        auth: { login: '登入', loggingIn: '登入中...', loginWithNetlifyIdentity: '使用 Netlify Identity 登入', loginWithProviders: '使用其他方式登入' },
        app: { header: { quickAdd: '快速新增' }, sidebar: { collections: '內容管理', allCollections: '所有分類', search: '搜尋...', settings: '設定' } },
        collection: { sidebar: { collections: '分類', search: '搜尋文章...' }, collectionTop: { sortBy: '排序依據', viewAs: '瀏覽視態' }, entries: { emptyCollection: '此分類目前沒有資料', loadingEntries: '正在載入資料...' } },
        editor: { editorToolbar: { publishing: '發布中...', publish: '發布變更', published: '已發布', save: '儲存暫存', saving: '儲存中...' } },
        mediaLibrary: { mediaLibrary: { mediaLibrary: '媒體庫', upload: '上傳新照片', uploading: '上傳中...' } }
      });
    }
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.netlifyIdentity) {
        
        // 初始化連線
        window.netlifyIdentity.init({
          APIUrl: 'https://calm-tarsier-bd25df.netlify.app/.netlify/identity'
        });

        // 正常狀況下的監聽（如果瀏覽器沒擋，這行會動）
        window.netlifyIdentity.on('login', () => {
          window.netlifyIdentity.close();
          window.location.href = 'https://twquanjing.github.io/admin/#/';
        });

        window.netlifyIdentity.on('logout', () => {
          window.location.href = 'https://twquanjing.github.io/';
        });

        // 🔥【超強補強】當使用者點擊 Google 登入時，啟動定時自動搜身雷達
        // 每 1.5 秒自動檢查一次使用者的登入狀態，一旦發現後台已經認證成功，強行轉址！
        setInterval(() => {
          const user = window.netlifyIdentity.currentUser();
          // 如果發現已經拿到登入資料，且網址還卡在沒有 /#/ 的登入頁
          if (user && (!window.location.hash || window.location.hash === '#')) {
            console.log("偵測到 Google 登入成功，正在強制引導進入後台...");
            window.netlifyIdentity.close();
            window.location.href = 'https://twquanjing.github.io/admin/#/';
          }
        }, 1500);

      }
    });
  </script>
</body>
</html>
