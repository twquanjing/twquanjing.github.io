<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全境工程有限公司 - 網站管理後台</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    /* 強行放大後台所有文字與輸入框 */
    html, body, #nc-root {
      font-size: 18px !important; /* 全域基礎字體放大 */
    }
    
    /* 放大左側導覽列分類字體 */
    [class*="SidebarLink"], [class*="CollectionTopHeading"] {
      font-size: 20px !important;
      font-weight: bold !important;
    }

    /* 放大表單填寫區的標題 */
    [class*="FieldLabel"] {
      font-size: 19px !important;
      color: #2c3e50 !important;
      font-weight: bold !important;
      margin-bottom: 8px !important;
    }

    /* 放大輸入框（Input）與文字區域（Textarea）的文字與內距 */
    input, textarea, select, [class*="ControlPaneContainer"] {
      font-size: 18px !important;
      padding: 12px !important;
      line-height: 1.6 !important;
      border: 2px solid #bdc3c7 !important; /* 加粗框線，讓長輩看更清 */
      border-radius: 6px !important;
    }

    /* 當輸入框被點擊時，框線加深 */
    input:focus, textarea:focus {
      border-color: #008099 !important;
      box-shadow: 0 0 8px rgba(0, 128, 153, 0.2) !important;
    }

    /* 頂部發布與儲存按鈕加大 */
    [class*="TopBarContainer"] button, [class*="Toolbar"] button {
      font-size: 18px !important;
      padding: 8px 20px !important;
      font-weight: bold !important;
    }
    
    /* 修正媒體庫照片說明的字體 */
    [class*="FileCard"] {
      font-size: 16px !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    if (window.CMS) {
      window.CMS.registerLocale('zh_TW', {
        auth: { login: '登入', loggingIn: '登入中...', loginWithNetlifyIdentity: '使用 Netlify Identity 登入', loginWithProviders: '使用其他方式登入' },
        app: { header: { quickAdd: '快速新增', logout: '登出' }, sidebar: { collections: '內容管理', allCollections: '所有分類', search: '搜尋...', settings: '設定' } },
        collection: { sidebar: { collections: '分類', search: '搜尋文章...' }, collectionTop: { sortBy: '排序依據', viewAs: '瀏覽視態' }, entries: { emptyCollection: '此分類目前沒有資料', loadingEntries: '正在載入資料...' } },
        editor: { editorToolbar: { publishing: '發布中...', publish: '發布變更', published: '已發布', save: '儲存暫存', saving: '儲存中...' } },
        mediaLibrary: { mediaLibrary: { mediaLibrary: '媒體庫', upload: '上傳新照片', uploading: '上傳中...' } }
      });
    }
  </script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.netlifyIdentity) {
        
        // 1. 初始化 Netlify Identity 連線
        window.netlifyIdentity.init({
          APIUrl: 'https://calm-tarsier-bd25df.netlify.app/.netlify/identity'
        });

        // 🎯 核心邏輯：憑 Token（User 狀態）決定生死
        const checkAuthAndRedirect = () => {
          const user = window.netlifyIdentity.currentUser(); // 檢查瀏覽器內是否有登入 Token
          const currentHash = window.location.hash;

          // 【狀態 A】有 Token，但網址還在登入前頁面 ➔ 代表登入成功，立刻引導進後台
          if (user && (!currentHash || currentHash === '#' || currentHash === '')) {
            console.log("偵測到成功取得 Token，正在引導進入管理後台...");
            window.netlifyIdentity.close();
            window.location.href = 'https://twquanjing.github.io/admin/#/';
          }
        };

        // 2. 監聽：一旦 Widget 認證成功拿到 Token，立刻執行跳轉
        window.netlifyIdentity.on('login', () => {
          checkAuthAndRedirect();
        });

        // 3. 監聽：當點擊登出按鈕，Token 被清除時，立刻主動倒回前台
        window.netlifyIdentity.on('logout', () => {
          console.log("Token 已清除，正在主動跳轉回前台首頁...");
          window.location.href = 'https://twquanjing.github.io/';
        });

        // 4. ✨ 防呆雙保險：網頁一打開（或重整時），立刻主動掃描一次 Token 狀態
        // 這能確保當長輩用 Google 登入、視窗重新導回時，100% 觸發進入後台
        checkAuthAndRedirect();

      }
    });
  </script>
</body>
</html>
