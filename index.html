<script>
    // 1. 讀取並渲染基本聯絡資訊 + 核心工程服務欄位
    fetch('/data/settings.json')
        .then(res => res.json())
        .then(data => {
            // 原本的主視覺區
            if(data.hero_title) document.getElementById('hero-title').innerText = data.hero_title;
            if(data.hero_desc) document.getElementById('hero-desc').innerText = data.hero_desc;
            
            // ✨ 新增：動態替換核心工程的總標題與四大項目（若後台有改，前台就跟著變；若沒改就用原本的預設文字）
            if(data.services_main_title) {
                const titleEl = document.querySelector('.container .section-title');
                if(titleEl) titleEl.innerText = data.services_main_title;
            }
            
            const cards = document.querySelectorAll('.service-card');
            if(cards.length >= 4) {
                if(data.service1_title) cards[0].querySelector('h3').innerText = data.service1_title;
                if(data.service1_desc) cards[0].querySelector('p').innerHTML = data.service1_desc;
                
                if(data.service2_title) cards[1].querySelector('h3').innerText = data.service2_title;
                if(data.service2_desc) cards[1].querySelector('p').innerHTML = data.service2_desc;
                
                if(data.service3_title) cards[2].querySelector('h3').innerText = data.service3_title;
                if(data.service3_desc) cards[2].querySelector('p').innerHTML = data.service3_desc;
                
                if(data.service4_title) cards[3].querySelector('h3').innerText = data.service4_title;
                if(data.service4_desc) cards[3].querySelector('p').innerHTML = data.service4_desc;
            }

            // 原本的聯絡資料區
            if(data.email) document.getElementById('info-email').innerText = data.email;
            if(data.address) document.getElementById('info-address').innerText = data.address + " (全台皆有團隊服務)";
            
            if(data.line_url) {
                document.querySelectorAll('.dynamic-line').forEach(el => el.href = data.line_url);
            }
            if(data.phone_number) {
                document.querySelectorAll('.dynamic-phone').forEach(el => el.href = "tel:" + data.phone_number);
            }
        }).catch(err => console.log("使用預設基本資料"));

    // 2. 終極動態案例撈取（同時支援 .md 與 .json 檔案解析）
    fetch('https://api.github.com/repos/twquanjing/twquanjing.github.io/contents/data/cases')
        .then(res => res.json())
        .then(files => {
            if (!Array.isArray(files)) return;
            const container = document.getElementById('cases-container');
            container.innerHTML = '';

            files.forEach(file => {
                if (file.name.endsWith('.json') || file.name.endsWith('.md')) {
                    fetch(file.download_url)
                        .then(res => res.text())
                        .then(text => {
                            let tag = '工程實績';
                            let image = '';
                            let description = '';

                            if (file.name.endsWith('.json')) {
                                try {
                                    const caseData = JSON.parse(text);
                                    tag = caseData.tag || tag;
                                    image = caseData.image || image;
                                    description = caseData.description || description;
                                } catch(e) {}
                            } else {
                                const tagMatch = text.match(/tag:\s*["']?([^"'\n]+)["']?/);
                                const imageMatch = text.match(/image:\s*["']?([^"'\n]+)["']?/);
                                const descMatch = text.match(/description:\s*["']?([^"'\n]+)["']?/);
                                if (tagMatch) tag = tagMatch[1];
                                if (imageMatch) image = imageMatch[1];
                                if (descMatch) description = descMatch[1];
                            }

                            if (image) {
                                const card = document.createElement('div');
                                card.className = 'gallery-item';
                                card.innerHTML = `
                                    <span class="gallery-tag">${tag}</span>
                                    <img src="${image}" alt="${tag}" onerror="this.src='https://images.unsplash.com/photo-1581094288338-2314dddb7ece?auto=format&fit=crop&w=600&q=80'">
                                    <p style="margin-top: 10px; font-weight: bold; color: #333;">${description}</p>
                                `;
                                container.appendChild(card);
                            }
                        });
                }
            });
        }).catch(err => {
            document.getElementById('cases-container').innerHTML = '<p style="text-align:center; color:#999;">目前尚無施工案例，請至後台新增！</p>';
        });
</script>
